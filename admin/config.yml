backend:
  name: github
  repo: fraamira/amira-magazine
  branch: main
  base_url: https://amira-magazine.vercel.app
  auth_endpoint: api/auth

media_folder: "immagini"
public_folder: "/immagini"

locale: 'it'

collections:
  - name: "articoli"
    label: "Articoli"
    label_singular: "Articolo"
    folder: "_articoli"
    create: true
    slug: "{{slug}}"
    identifier_field: "titolo"
    fields:
      - { label: "Titolo", name: "titolo", widget: "string" }
      - { label: "Titolo corsivo", name: "titolo_em", widget: "string", required: false }
      - label: "Rubrica"
        name: "rubrica"
        widget: "select"
        default: "magazine"
        options:
          - { label: "Magazine (archivio generale)", value: "magazine" }
          - { label: "FILOS — Human to Human", value: "filos" }
      - { label: "Data", name: "date", widget: "datetime", format: "YYYY-MM-DD", date_format: "DD/MM/YYYY", time_format: false }
      - { label: "Luogo o tema", name: "luogo", widget: "string" }
      - { label: "Articolo di (nome e cognome)", name: "autore", widget: "string", default: "Francesco Amirante" }
      - { label: "Foto di (nome e cognome fotografo)", name: "fotografo", widget: "string", required: false, hint: "Lascia vuoto se non applicabile" }
      - { label: "Minuti di lettura", name: "minuti", widget: "number", value_type: "int", default: 5 }
      - { label: "Foto copertina", name: "copertina", widget: "image" }
      - { label: "Breve estratto", name: "estratto", widget: "string" }
      - { label: "Testo introduttivo", name: "intro", widget: "text" }
      - label: "Contenuto articolo"
        name: "contenuto"
        widget: "list"
        label_singular: "Blocco"
        types:
          - label: "Paragrafo di testo"
            name: "paragrafo"
            widget: "object"
            fields:
              - { label: "Testo", name: "testo", widget: "text" }
          - label: "Foto singola"
            name: "foto"
            widget: "object"
            fields:
              - { label: "Immagine", name: "immagine", widget: "image" }
              - { label: "Didascalia", name: "didascalia", widget: "string", required: false }
          - label: "Gallery (2-4 foto)"
            name: "gallery"
            widget: "object"
            fields:
              - { label: "Foto 1", name: "foto1", widget: "image" }
              - { label: "Foto 2", name: "foto2", widget: "image", required: false }
              - { label: "Foto 3", name: "foto3", widget: "image", required: false }
              - { label: "Foto 4", name: "foto4", widget: "image", required: false }
          - label: "Citazione in evidenza"
            name: "citazione"
            widget: "object"
            fields:
              - { label: "Testo", name: "testo", widget: "string" }
              - { label: "Parte in oro", name: "em", widget: "string", required: false }
          - label: "Clip Audio"
            name: "audio"
            widget: "object"
            fields:
              - { label: "File audio", name: "url", widget: "file" }
              - { label: "Trascrizione", name: "trascrizione", widget: "text", required: false, hint: "Scrivi in italiano e inglese — tradotto automaticamente nelle altre lingue" }
          - label: "Video (YouTube o file)"
            name: "video"
            widget: "object"
            fields:
              - { label: "URL video", name: "url", widget: "string" }
      - { label: "Pubblica", name: "pubblicato", widget: "boolean", default: true }

  - name: "gallery"
    label: "The Gallery"
    label_singular: "Galleria"
    folder: "_gallery"
    create: true
    slug: "{{slug}}"
    identifier_field: "titolo"
    fields:
      - { label: "Titolo galleria", name: "titolo", widget: "string", hint: "Es: Soy Español — A sense of belonging" }
      - { label: "Sottotitolo (em)", name: "titolo_em", widget: "string", required: false, hint: "Parte in corsivo del titolo" }
      - { label: "Mese", name: "mese", widget: "string", hint: "Es: July 2026" }
      - { label: "Luogo", name: "luogo", widget: "string", hint: "Es: Madrid, Spain" }
      - { label: "Fotografo", name: "fotografo", widget: "string", default: "Francesco Amirante" }
      - { label: "Descrizione", name: "descrizione", widget: "text", hint: "Testo introduttivo della galleria" }
      - { label: "Foto copertina", name: "copertina", widget: "image", hint: "Foto principale — formato orizzontale" }
      - label: "Foto della galleria"
        name: "foto"
        widget: "list"
        label_singular: "Foto"
        fields:
          - { label: "Immagine", name: "immagine", widget: "image" }
          - { label: "Didascalia", name: "didascalia", widget: "string", required: false }
      - { label: "Attiva sulla home", name: "attiva", widget: "boolean", default: true, hint: "Mostra questa galleria sulla home" }

  - name: "newsletter"
    label: "Newsletter — Iscritti"
    label_singular: "Iscritto"
    folder: "_newsletter"
    create: true
    slug: "{{fields.email}}"
    identifier_field: "email"
    fields:
      - { label: "Email", name: "email", widget: "string" }
      - { label: "Data iscrizione", name: "date", widget: "datetime", format: "YYYY-MM-DD HH:mm", date_format: "DD/MM/YYYY", time_format: "HH:mm" }
      - { label: "Note", name: "note", widget: "string", required: false }
